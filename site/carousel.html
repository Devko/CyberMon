<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- Print template, not a reader page: js/carousel.js renders one module
       (?page=<id>) as a stack of 1080×1350 slides and tools/make_carousels.py
       prints them to a LinkedIn document-post PDF at deploy time. -->
  <title>CyberMon — carousel print template</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0e0f11">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,700;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/market.css">
  <link rel="stylesheet" href="css/carousel.css">
</head>
<body class="carousel">

  <main id="slides"></main>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <script type="module" src="js/carousel.js"></script>
</body>
</html>
