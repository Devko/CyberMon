name: CI

# Tests + offline smoke run on every push and PR; deploys the site to
# GitHub Pages on pushes to main so site changes ship without waiting
# for the nightly data refresh.
#
# The nightly bot commit carries "[skip ci]" in its message, so this
# workflow does not re-run (and re-deploy) on top of the nightly's own
# deployment.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: cybermon-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests and offline smoke run
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt pytest

      - name: Run tests
        run: python -m pytest pipeline/tests -q

      # End-to-end smoke run with no network: fixtures in, JSON out.
      - name: Offline fixtures smoke run
        run: python -m pipeline --offline-fixtures --out "$RUNNER_TEMP/cybermon-out"

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    # Shared with nightly.yml's deploy job so the two workflows never
    # race a Pages deployment. Queue, don't cancel.
    concurrency:
      group: cybermon-pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
