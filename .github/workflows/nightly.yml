name: Nightly data refresh

# Runs the full pipeline against live sources, commits the refreshed
# site/data/ (including the append-only history/nvd_backlog.csv, which
# CANNOT be regenerated), then deploys the site to GitHub Pages.

on:
  schedule:
    # 02:43 UTC — off-peak, deliberately not on the hour (GitHub delays
    # and drops :00 cron jobs under load).
    - cron: "43 2 * * *"
  workflow_dispatch:

# Never let two nightly runs overlap (the data commit + history append
# is not safe to race). Queue instead of cancel so a manual dispatch
# during the scheduled run still happens.
concurrency:
  group: cybermon-nightly
  cancel-in-progress: false

jobs:
  refresh:
    name: Run pipeline and commit data
    runs-on: ubuntu-latest
    # Slow upstreams (GDELT pacing, keyless NVD paging); allow headroom.
    timeout-minutes: 120
    permissions:
      contents: write
      # For the failure-alert step below (gh issue create/comment).
      issues: write
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      # NVD incremental-sync state (per-CVE status map). A cache miss is
      # harmless: the pipeline just does a full corpus sweep and rebuilds
      # it. The key is unique per run so the updated state is saved after
      # every night; restore-keys picks up the newest previous one.
      - name: Restore NVD sync state
        uses: actions/cache@v4
        with:
          path: .cache/nvd_status_state.json.gz
          key: nvd-status-state-${{ github.run_id }}
          restore-keys: |
            nvd-status-state-

      # Market-hype sync state (per-term monthly counts + HN backfill
      # queue). Same self-healing semantics as the NVD state above.
      - name: Restore market-hype sync state
        uses: actions/cache@v4
        with:
          path: .cache/market_state.json
          key: market-state-${{ github.run_id }}
          restore-keys: |
            market-state-

      # ATT&CK per-release stats state (immutable derived stats per
      # enterprise release). Same self-healing semantics as the NVD state
      # above — and doubly so: a miss here is first reconstructed from the
      # published site/data/attack_churn.json, so it never re-triggers the
      # full ~40-bundle backfill.
      - name: Restore ATT&CK sync state
        uses: actions/cache@v4
        with:
          path: .cache/attack_state.json
          key: attack-state-${{ github.run_id }}
          restore-keys: |
            attack-state-

      # EPSS report-card sync state (day-before score per KEV entry —
      # historical scores are immutable, each pair is looked up once).
      # Same self-healing semantics as the ATT&CK state above, and doubly
      # so: a miss here is first reconstructed from the published
      # site/data/epss_report.json, so it never re-triggers the historical
      # backfill (which is batch-capped anyway: --epss-backfill-batch).
      - name: Restore EPSS report-card sync state
        uses: actions/cache@v4
        with:
          path: .cache/epss_report_state.json
          key: epss-report-state-${{ github.run_id }}
          restore-keys: |
            epss-report-state-

      # If this step fails, the job fails and the deploy job below is
      # skipped — stale/broken data is never deployed. Do NOT add
      # continue-on-error here.
      - name: Run pipeline
        env:
          # Optional; the pipeline tolerates an empty value and falls
          # back to slower keyless NVD paging.
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: python -m pipeline --out site/data

      - name: Commit and push refreshed data
        run: |
          git config user.name "cybermon-bot"
          git config user.email "cybermon-bot@users.noreply.github.com"
          git add site/data
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: nightly refresh $(date -u +%Y-%m-%d) [skip ci]"
            # Tolerate commits that landed on main while the pipeline ran.
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      # Once per ISO week, freeze an immutable snapshot tag on HEAD. The
      # append-only site/data/history/nvd_backlog.csv CANNOT be regenerated
      # (this repo is its only copy), so a weekly tag is a rollback point if
      # the file is ever corrupted or truncated by a bad run. Insurance, not
      # the product: every failure mode here is swallowed so it can never
      # take down the refresh itself (the pipeline-run step above still must
      # NOT get continue-on-error — this leniency is for the backup only).
      - name: Push weekly history backup tag
        run: |
          tag="data-backup-$(date -u +%G-W%V)"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Backup tag ${tag} already on origin; nothing to do."
          else
            # Annotated tag so the bot identity (configured above) is
            # recorded as the tagger.
            git tag -a "${tag}" -m "Weekly immutable snapshot of site/data (incl. history/)" HEAD \
              && git push origin "refs/tags/${tag}" \
              || echo "::warning::Could not push backup tag ${tag} (non-fatal; will retry next night this week)."
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # LinkedIn-carousel PDFs (one per module page), rendered from the
      # freshly committed data. Built here, after the data commit and right
      # before the artifact upload, so the PDFs ship inside the Pages
      # artifact without ever touching git history — binary PDFs regenerated
      # every night would bloat the repo (site/carousels/ is gitignored).
      - name: Install Playwright
        run: pip install -r pipeline/requirements-dev.txt

      # --with-deps also apt-installs the browser's system libraries.
      - name: Install headless Chromium
        run: playwright install --with-deps chromium

      - name: Build carousel PDFs
        run: python3 tools/make_carousels.py --out site/carousels

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      # If anything above failed, leave a paper trail where humans actually
      # look. One open issue labeled nightly-failure collects every failing
      # run as a comment, so a week of breakage threads in a single issue
      # instead of spamming a new one per night.
      - name: Alert on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          # Explicit repo so gh works even if the failure hit the checkout.
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Make sure the label exists (first failure on a fresh fork);
          # --force makes this a no-op when it already does.
          gh label create nightly-failure \
            --description "The nightly data refresh is broken" \
            --color D93F0B --force || true
          issue="$(gh issue list --label nightly-failure --state open \
            --json number --jq '.[0].number // empty')"
          if [ -n "$issue" ]; then
            gh issue comment "$issue" --body "Nightly refresh failed again: $RUN_URL"
          else
            gh issue create \
              --title "Nightly data refresh is failing" \
              --label nightly-failure \
              --body "The nightly data refresh failed — nothing was deployed. First failing run: $RUN_URL"
          fi

  deploy:
    name: Deploy to GitHub Pages
    needs: refresh
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    # Shared with ci.yml's deploy job so the two workflows never race
    # a Pages deployment. Queue, don't cancel.
    concurrency:
      group: cybermon-pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
